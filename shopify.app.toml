# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "3b68b2d646214f65e42d514aeb4397eb"
name = "Vellismith-pick-list"
application_url = "https://vellismith-pick-list.onrender.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
#
# read_all_orders is REQUIRED for this app to work at all beyond ~2 months.
# Without it Shopify only exposes orders from the LAST 60 DAYS to the API, so a
# pick list for any older date range silently comes back empty even though the
# orders are plainly visible in the Shopify Admin. It must be used alongside
# read_orders, and Shopify must grant it first: request it in the Partner
# Dashboard under the app's API access / App Setup section. Adding it here
# before approval will not work.
scopes = "write_products,write_metaobjects,write_metaobject_definitions,read_orders,read_all_orders,read_products,read_fulfillments,read_third_party_fulfillment_orders,read_assigned_fulfillment_orders,read_merchant_managed_fulfillment_orders"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://vellismith.com/api/auth" ]

[build]
automatically_update_urls_on_dev = true
